[variables]
NIXPACKS_NO_MISE = "1"

[phases.setup]
nixPkgs = [
  "python311",
  "chromium",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "libxkbcommon",
  "gtk3",
  "pango",
  "cairo",
  "glib",
  "dbus"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium"
]

[start]
cmd = "python bot.py"